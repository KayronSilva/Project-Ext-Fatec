{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
        .auth-wrap { width:100%; max-width:400px; padding:16px; }
        .auth-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-md); padding:40px 36px 36px; box-shadow:var(--shadow-md); }

        .auth-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:28px; }
        .auth-logo__icon { width:40px; height:40px; border-radius:10px; background:var(--blue); display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px; }
        .auth-logo__text { font-size:17px; font-weight:700; color:var(--text); }

        .auth-badge { display:flex; align-items:center; justify-content:center; gap:6px; padding:5px 14px; background:var(--blue-bg); border:1px solid var(--blue-border); border-radius:var(--r-full); color:var(--blue-dark); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:24px; }

        .auth-title { font-size:22px; font-weight:700; color:var(--text); text-align:center; margin-bottom:6px; }
        .auth-sub   { font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:28px; }

        .auth-error { display:flex; align-items:center; gap:8px; padding:10px 14px; background:#fff5f5; border:1.5px solid #fca5a5; border-radius:var(--r-sm); color:#b91c1c; font-size:13px; font-weight:500; margin-bottom:18px; }

        .field { margin-bottom:16px; }
        .field label { display:block; font-size:12.5px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
        .field input  { width:100%; box-sizing:border-box; }

        .btn-block { width:100%; justify-content:center; margin-top:8px; font-size:14px; padding:11px; }

        .auth-footer { margin-top:24px; text-align:center; font-size:12.5px; color:var(--text-muted); }
        .auth-footer a { color:var(--blue); text-decoration:none; font-weight:600; }
        .auth-footer a:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo__icon">⚙</div>
      <span class="auth-logo__text">Sistema de Devoluções</span>
    </div>

    <div class="auth-badge">🔐 Área Administrativa</div>

    <h1 class="auth-title">Entrar como Admin</h1>
    <p class="auth-sub">Acesso restrito a administradores do sistema</p>

    {% if error %}
    <div class="auth-error">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7.5" cy="7.5" r="6.5"/><path d="M7.5 4.5v3.5M7.5 10.5h.01" stroke-linecap="round"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="field">
        <label for="id_email">E-mail</label>
        <input type="email" name="email" id="id_email"
               placeholder="admin@empresa.com"
               value="{{ form.email.value|default:'' }}"
               autocomplete="email" autofocus>
      </div>

      <div class="field">
        <label for="id_senha">Senha</label>
        <input type="password" name="senha" id="id_senha"
               placeholder="••••••••"
               autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Entrar no painel
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M2.5 6.5h8M7 3l3.5 3.5L7 10"/></svg>
      </button>
    </form>

    <div class="auth-footer">
      Não é administrador? <a href="{% url 'login' %}">Acessar área do cliente</a>
    </div>

  </div>
</div>
</body>
</html>
